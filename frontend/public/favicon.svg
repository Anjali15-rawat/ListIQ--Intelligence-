<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f06595"/>
      <stop offset="100%" style="stop-color:#e64980"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Sparkle / asterisk star shape -->
  <g transform="translate(32,32)" fill="white">
    <!-- 4 main arms -->
    <rect x="-3" y="-18" width="6" height="36" rx="3"/>
    <rect x="-18" y="-3" width="36" height="6" rx="3"/>
    <!-- 4 diagonal arms (rotated 45deg) -->
    <rect x="-3" y="-18" width="6" height="36" rx="3" transform="rotate(45)"/>
    <rect x="-3" y="-18" width="6" height="36" rx="3" transform="rotate(-45)"/>
  </g>
</svg>
